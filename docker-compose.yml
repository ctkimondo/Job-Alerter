services:
  # Stores jobs in 'topics' before AI processes them
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9093:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT, PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9093

  # This dashboard shows you which workers are doing what
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    # The container runs the 'master' java class
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
  
  # This container matches jobs using the Gemini API
  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    # EXPLANATION: This tells the container to be a worker and report to the master's 'Back Door' (7077)
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
        - SPARK_WORKER_CORES=1
        - SPARK_WORKER_MEMORY=1G
   
  # This is where the high-match jobs are stores
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # Prevents the data from dissapearing if computer is restarted, or container isnt running
    volumes:
      - postgres_data:/var/lib/postgresql/data 

volumes:
  postgres_data: